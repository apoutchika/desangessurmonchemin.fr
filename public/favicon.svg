<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shellGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d5440;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#f5f0e8"/>
  
  <!-- Coquille Saint-Jacques -->
  <g transform="translate(50, 55)" filter="url(#shadow)">
    <!-- Base de la coquille -->
    <path d="M 0 -30 
             L -25 15 
             Q -25 18, -22 18
             L 22 18
             Q 25 18, 25 15
             L 0 -30 Z" 
          fill="url(#shellGradient)"/>
    
    <!-- Rainures de la coquille (9 rainures) -->
    <path d="M 0 -30 L -20 15" stroke="#f5f0e8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0 -30 L -15 16" stroke="#f5f0e8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0 -30 L -10 17" stroke="#f5f0e8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0 -30 L -5 17.5" stroke="#f5f0e8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0 -30 L 0 18" stroke="#f5f0e8" stroke-width="2" stroke-linecap="round" opacity="0.95"/>
    <path d="M 0 -30 L 5 17.5" stroke="#f5f0e8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0 -30 L 10 17" stroke="#f5f0e8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0 -30 L 15 16" stroke="#f5f0e8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    <path d="M 0 -30 L 20 15" stroke="#f5f0e8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Arc inférieur de la coquille -->
    <path d="M -22 18 Q 0 14, 22 18" 
          fill="none" 
          stroke="#5a7a5f" 
          stroke-width="2.5" 
          stroke-linecap="round"/>
    
    <!-- Détails d'ombre pour le relief -->
    <path d="M -23 15 L -22 18 L 22 18 L 23 15" 
          fill="#3d5440" 
          opacity="0.3"/>
  </g>
</svg>
